<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — GreenThumb</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3E7428;
      --primary-dark: #2A5414;
      --secondary: #6BA83A;
      --primary-light: #C8E6A0;
      --cream: #F6EFDD;
      --background-light: #FAF6EE;
      --light-green: #E8F5D0;
      --text: #1A1A1A;
      --text-muted: #666666;
      --white: #ffffff;
      --border: #E8DFC8;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      background: var(--primary-dark);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      color: var(--cream);
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: 32px 20px 48px;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: 0 2px 12px rgba(42, 84, 20, 0.08);
    }

    .card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--primary-dark);
      margin-bottom: 8px;
    }

    .card p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--primary);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .success-message {
      display: none;
      text-align: center;
      padding: 24px;
    }

    .success-message .checkmark {
      width: 56px;
      height: 56px;
      background: var(--light-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .success-message .checkmark svg {
      width: 28px;
      height: 28px;
      color: var(--primary);
    }

    .success-message h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--primary-dark);
      margin-bottom: 8px;
    }

    .success-message p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 0;
    }

    .footer {
      text-align: center;
      padding: 24px 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="logo.png" alt="GreenThumb" style="width:40px;height:40px;border-radius:10px;">
    <h1>GreenThumb</h1>
  </div>

  <div class="container">
    <div class="card">
      <div id="formView">
        <h2>Contact Us</h2>
        <p>Have a question or need help with GreenThumb? Send us a message and we'll get back to you as soon as possible.</p>

        <form id="contactForm" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="name">Your name</label>
            <input type="text" id="name" name="name" required placeholder="Jane Doe">
          </div>

          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required placeholder="How can we help?"></textarea>
          </div>

          <input type="hidden" name="type" value="contact">

          <button type="submit" class="btn btn-primary" id="submitBtn">Send Message</button>
        </form>
      </div>

      <div class="success-message" id="successView">
        <div class="checkmark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h3>Message Sent</h3>
        <p>Thanks for reaching out! We'll get back to you as soon as possible.</p>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>&copy; 2026 GreenThumb &middot; <a href="privacy-policy.html">Privacy Policy</a> &middot; <a href="terms-of-service.html">Terms of Service</a> &middot; <a href="delete-account.html">Delete Account</a></p>
  </div>

  <script>
    async function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      const res = await fetch('https://formspree.io/f/xgodvgaz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'contact',
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          message: document.getElementById('message').value,
        }),
      });

      if (res.ok) {
        document.getElementById('formView').style.display = 'none';
        document.getElementById('successView').style.display = 'block';
      } else {
        btn.disabled = false;
        btn.textContent = 'Send Message';
        alert('Something went wrong. Please try again.');
      }
    }
  </script>

</body>
</html>
